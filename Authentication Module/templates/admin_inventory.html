<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediSync Admin | Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --ms-dark: #212529; --sidebar-width: 280px; }
        body { background: #f4f7f6; font-family: 'Poppins', sans-serif; }
        .sidebar { width: var(--sidebar-width); height: 95vh; position: fixed; top: 2.5vh; left: 20px; background: var(--ms-dark); border-radius: 20px; padding: 2.5rem 1.5rem; color: white; }
        .main-content { margin-left: calc(var(--sidebar-width) + 40px); padding: 2.5rem; }
        .nav-link { color: rgba(255,255,255,0.7); padding: 12px 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; text-decoration: none; }
        .nav-link.active { background: #0d6efd; color: white !important; }
        .card { border: none; border-radius: 20px; }
    </style>
</head>
<body>
<div class="sidebar shadow-lg">
    <h3 class="fw-bold mb-5 px-3"><i class='bx bxs-shield-alt-2 me-3 text-primary'></i> Admin</h3>
    <nav class="nav flex-column">
        <a class="nav-link" href="/admin/dashboard"><i class='bx bxs-dashboard'></i> Overview</a>
        <a class="nav-link active" href="/admin/inventory"><i class='bx bxs-capsule'></i> Inventory</a>
        <a class="nav-link" href="/admin/users"><i class='bx bxs-user-detail'></i> Users</a>
        <hr class="my-5" style="opacity: 0.2;">
        <a class="nav-link text-danger" href="/logout"><i class='bx bx-log-out-circle'></i> Logout</a>
    </nav>
</div>
<div class="main-content">
    <h2 class="fw-bold mb-4">Inventory Control</h2>
    <div class="card shadow-sm p-4">
        <table class="table table-hover align-middle">
            <thead class="bg-light">
                <tr>
                    <th>Item ID</th>
                    <th>Medicine Name</th>
                    <th>Current Stock</th>
                    <th>Unit Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for item in inventory %}
                <tr>
                    <td>#MED-{{ item.id }}</td>
                    <td><b>{{ item.name }}</b></td>
                    <td>
                        <span class="badge {% if item.stock < 20 %}bg-danger{% else %}bg-success{% endif %}">
                            {{ item.stock }} units
                        </span>
                    </td>
                    <td>₹{{ item.price }}</td>
                    <td><button class="btn btn-sm btn-outline-dark">Update Stock</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
