<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSync | Doctor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-heart-pulse"></i> MediSync Doctor Portal</span>
        <div class="d-flex align-items-center">
            <span class="text-white me-3">Dr. {{ session['user'] }}</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <form action="/submit_prescription" method="POST">
        <div class="row">
            <!-- Patient Selection -->
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white fw-bold">Select Patient</div>
                    <div class="card-body">
                        <select class="form-select mb-3" id="patientSelect" name="patient_id" required>
                            <option selected disabled value="">Choose Patient...</option>
                            {% for patient in patients %}
                                <option value="{{ patient.name }}">Patient: {{ patient.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="small text-muted italic">Only registered users with 'patient' role appear here.</div>
                    </div>
                </div>

                <!-- Recent Activity Feed -->
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-bold">Recent Bills Generated</div>
                    <ul class="list-group list-group-flush">
                        {% for bill in recent_bills %}
                        <li class="list-group-item small d-flex justify-content-between">
                            <span>{{ bill.patient_name }}</span>
                            <span class="fw-bold text-success">₹{{ bill.total_amount }}</span>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>

            <!-- Digital Prescription -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Digital Prescription & Billing</span>
                        <button type="button" class="btn btn-success btn-sm" onclick="addRow()">
                            <i class="bi bi-plus-circle"></i> Add Medicine
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="medicineRows">
                            <div class="row g-2 mb-3 medicine-row">
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">Medicine Name</label>
                                    <select class="form-select" name="medicine[]" required>
                                        <option selected disabled value="">Select Medicine...</option>
                                        {% for med in medicines %}
                                            <option value="{{ med.id }}">
                                                {{ med.name }} (Stock: {{ med.stock }}) - ₹{{ med.price }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label small text-muted">Quantity</label>
                                    <input type="number" class="form-control" name="qty[]" min="1" value="1" required>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label small text-muted">Dosage</label>
                                    <input type="text" class="form-control" name="dosage[]" placeholder="1-0-1">
                                </div>
                                <div class="col-md-1 d-flex align-items-end">
                                    <button type="button" class="btn btn-outline-danger btn-sm mb-1" onclick="this.parentElement.parentElement.remove()">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <hr>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-receipt"></i> Generate Prescription & Invoice
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    function addRow() {
        const row = `
        <div class="row g-2 mb-3 medicine-row">
            <div class="col-md-6">
                <select class="form-select" name="medicine[]" required>
                    <option selected disabled value="">Select Medicine...</option>
                    {% for med in medicines %}
                        <option value="{{ med.id }}">
                            {{ med.name }} (Stock: {{ med.stock }}) - ₹{{ med.price }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <input type="number" class="form-control" name="qty[]" min="1" value="1" required>
            </div>
            <div class="col-md-2">
                <input type="text" class="form-control" name="dosage[]" placeholder="1-0-1">
            </div>
            <div class="col-md-1">
                <button type="button" class="btn btn-outline-danger btn-sm" onclick="this.parentElement.parentElement.remove()">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>`;
        document.getElementById('medicineRows').insertAdjacentHTML('beforeend', row);
    }
</script>
</body>
</html>
