<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediSync | My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --sidebar-width: 260px; }
        body { background: #f4f7f6; font-family: 'Poppins', sans-serif; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #fff; padding: 25px; }
        .main-content { margin-left: var(--sidebar-width); padding: 40px; }
        .nav-link { color: #555; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: #0d6efd; color: #fff !important; }
        .profile-img { width: 100px; height: 100px; background: #0d6efd; color: white; font-size: 3rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 20px; }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <h4 class="text-primary fw-bold mb-5"><i class='bx bxs-plus-circle'></i> MediSync</h4>
    <nav class="nav flex-column">
        <a class="nav-link" href="/patient/dashboard"><i class='bx bxs-dashboard'></i> My Health</a>
        <a class="nav-link" href="/patient/prescriptions"><i class='bx bx-file'></i> Prescriptions</a>
        <a class="nav-link active" href="/patient/profile"><i class='bx bx-user-circle'></i> Profile</a>
        <hr>
        <a class="nav-link text-danger" href="/logout"><i class='bx bx-log-out-circle'></i> Logout</a>
    </nav>
</div>

<div class="main-content text-center">
    <div class="card shadow-sm mx-auto p-5" style="max-width: 500px; border-radius: 25px;">
        <div class="profile-img">{{ user.name[0] }}</div>
        <h3 class="fw-bold">{{ user.name }}</h3>
        <p class="text-muted mb-4">Registered Patient</p>
        
        <div class="text-start bg-light p-4 rounded-4">
            <div class="mb-3">
                <label class="small text-muted d-block">Email Address</label>
                <span class="fw-bold">{{ user.email }}</span>
            </div>
            <div class="mb-3">
                <label class="small text-muted d-block">Date of Birth</label>
                <span class="fw-bold">{{ user.dob }}</span>
            </div>
            <div>
                <label class="small text-muted d-block">Account Status</label>
                <span class="badge bg-success">Verified Patient</span>
            </div>
        </div>
        <button class="btn btn-primary mt-4 w-100 rounded-pill">Update Profile Info</button>
    </div>
</div>
</body>
</html>
