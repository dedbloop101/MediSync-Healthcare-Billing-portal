<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediSync | Secure Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container text-center">
        <div class="card shadow-lg border-0 p-5 mx-auto" style="max-width: 500px; border-radius: 20px;">
            <h3 class="fw-bold mb-4">Secure Payment</h3>
            <div class="bg-primary-subtle p-4 rounded-4 mb-4">
                <span class="text-muted small">Amount to Pay</span>
                <h1 class="text-primary fw-bold">₹{{ bill.total_amount }}</h1>
                <p class="small text-muted mb-0">Invoice #MS-{{ bill.id }}</p>
            </div>

            <button id="rzp-button1" class="btn btn-primary btn-lg w-100 rounded-pill py-3 fw-bold">
                <i class='bx bxl-visa me-2'></i> Pay with Razorpay
            </button>
            
            <a href="/patient/dashboard" class="btn btn-link mt-3 text-muted">Cancel Payment</a>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
    var options = {
        "key": "rzp_test_Sj7YZuIS4nVSmX", // Get this from Razorpay Dashboard
        "amount": "{{ bill.total_amount * 100 }}", // Amount in paise (100 paise = 1 INR)
        "currency": "INR",
        "name": "MediSync Healthcare",
        "description": "Invoice Payment for #MS-{{ bill.id }}",
        "handler": function (response){
            // Redirect to success route on successful payment
            window.location.href = "/payment/success/" + "{{ bill.id }}";
        },
        "prefill": {
            "name": "{{ session['user'] }}",
        },
        "theme": { "color": "#0d6efd" }
    };
    var rzp1 = new Razorpay(options);
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
    </script>
</body>
</html>
