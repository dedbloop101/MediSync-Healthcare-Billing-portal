<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediSync | Patient List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --sidebar-width: 260px; }
        body { background: #f0f2f5; font-family: 'Poppins', sans-serif; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #fff; padding: 2rem 1.5rem; }
        .main-content { margin-left: var(--sidebar-width); padding: 2.5rem; }
        .nav-link { color: #5f6368; padding: 0.8rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; display: flex; align-items: center; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: #e8f0fe; color: #0d6efd; }
        .card { border: none; border-radius: 16px; }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <h3 class="text-primary fw-bold mb-5"><i class='bx bxs-plus-circle'></i> MediSync</h3>
    <nav class="nav flex-column">
        <a class="nav-link" href="/doctor/dashboard"><i class='bx bxs-grid-alt'></i> Dashboard</a>
        <a class="nav-link" href="/doctor/appointments"><i class='bx bx-calendar-event'></i> Appointments</a>
        <a class="nav-link active" href="/doctor/patients_list"><i class='bx bx-group'></i> Patients</a>
        <hr>
        <a class="nav-link text-danger" href="/logout"><i class='bx bx-log-out-circle'></i> Logout</a>
    </nav>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Patient Directory</h2>
        <input type="text" class="form-control w-25 shadow-sm" placeholder="Search by name...">
    </div>
    <div class="row">
        {% for patient in patients %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm p-3">
                <div class="d-flex align-items-center mb-2">
                    <div class="bg-primary text-white rounded-circle p-2 me-3" style="width: 40px; height: 40px; text-align: center;">
                        {{ patient.name[0] }}
                    </div>
                    <h6 class="mb-0 fw-bold">{{ patient.name }}</h6>
                </div>
                <div class="small text-muted mb-1"><i class='bx bx-envelope'></i> {{ patient.email }}</div>
                <div class="small text-muted"><i class='bx bx-calendar'></i> DOB: {{ patient.dob }}</div>
                <hr>
                <a href="/doctor/dashboard" class="btn btn-sm btn-primary w-100">Create Prescription</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
