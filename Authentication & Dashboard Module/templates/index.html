<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>MediSync | Login & Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        .input-box select {
            width: 100%;
            background: transparent;
            color: #fff;
            border: none;
            outline: none;
            padding: 10px 0;
            cursor: pointer;
        }
        .input-box select option {
            background: #333;
            color: #fff;
        }
        .social-btns {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
        }
        .para { margin-bottom: 10px; }
    </style>
</head>

<body>
    <!-- 1. GLOBAL GOOGLE CONFIGURATION (Shared by both forms) -->
    <div id="g_id_onload"
         data-client_id="1026976094861-bj5pov659p50fmksnhgpaj10qfq2oll7.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <div class="container">
        <div class="flip-card" id="flip-card">
            
            <!-- LOGIN FORM -->
            <div class="form-box" id="login-form">
                <h2 class="login">Login</h2>
                <form id="loginForm" action="/login" method="POST">
                    <div class="input-box">
                        <input type="email" name="email" id="login-email" placeholder="Email" required>
                        <i class='bx bxs-envelope'></i>
                    </div>
                    <div class="input-box">
                        <input type="password" name="password" id="login-password" placeholder="Password" required>
                        <i class='bx bxs-lock-alt'></i>
                    </div>
                    <button class="btn" type="submit">Login</button>
                </form>
                
                <div class="social-btns">
                    <p class="para"><b>Or login with</b></p>
                    <!-- Login Button -->
                    <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
                </div>

                <button type="button" class="toggle-btn" id="to-register">Don't have an account? <span>Register</span></button>
            </div>

            <!-- REGISTER FORM -->
            <div class="form-box" id="register-form">
                <h2>Register</h2>
                <form id="registerForm" action="/register" method="POST">
                    <div class="input-box">
                        <input type="text" name="name" id="reg-name" placeholder="Full Name" required>
                        <i class='bx bxs-user'></i>
                    </div>
                    <div class="input-box">
                        <input type="date" name="dob" id="reg-dob" required>
                    </div>
                    
                    <div class="input-box">
                        <select name="role" id="reg-role" required>
                            <option value="" disabled selected>Select Role</option>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                            <option value="admin">Admin</option>
                        </select>
                        <i class='bx bxs-briefcase'></i>
                    </div>

                    <div class="input-box">
                        <input type="email" name="email" id="reg-email" placeholder="Email" required>
                        <i class='bx bxs-envelope'></i>
                    </div>
                    <div class="input-box">
                        <input type="password" name="password" id="reg-password" placeholder="Password" required>
                        <i class='bx bxs-lock-alt'></i>
                    </div>

                    <button class="btn" type="submit">Register</button>
                </form>

                <div class="social-btns">
                    <p class="para"><b>Or register with</b></p>
                    <!-- 2. ADDED REGISTRATION BUTTON -->
                    <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signup_with" data-size="large" data-logo_alignment="left"></div>
                </div>

                <button type="button" class="toggle-btn" id="to-login">Already have an account? <span>Login</span></button>
            </div>
        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            
            // For demo purposes:
            alert("Google Authentication Successful! Redirecting to Dashboard...");
            
            // In a real scenario, we would send 'response.credential' to your Flask backend 
            // to verify the user and create a session.
            window.location.href = "/patient/dashboard"; 
        }
    </script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
