<!DOCTYPE html>
<html>
<head>
    <title>Success | Bill Generated</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container text-center">
        <div class="card shadow border-0 p-5 mx-auto" style="max-width: 500px; border-radius: 20px;">
            <div class="display-1 text-success mb-4"><i class='bx bxs-check-circle'></i></div>
            <h2 class="fw-bold">Billing Successful!</h2>
            <p class="text-muted">Prescription finalized for <strong>{{ patient }}</strong></p>
            <div class="bg-light p-3 rounded mb-4">
                <span class="text-muted small">Total Amount Deducted:</span>
                <h3 class="text-primary fw-bold">₹{{ total }}</h3>
            </div>
            <div class="d-grid gap-2">
                <a href="/doctor/dashboard" class="btn btn-primary btn-lg">Return to Dashboard</a>
                <p class="small text-muted mt-2">Inventory has been auto-updated.</p>
            </div>
        </div>
    </div>
</body>
</html>
