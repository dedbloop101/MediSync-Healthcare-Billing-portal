<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediSync | Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --sidebar-width: 260px; }
        body { background: #f0f2f5; font-family: 'Poppins', sans-serif; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #fff; padding: 2rem 1.5rem; }
        .main-content { margin-left: var(--sidebar-width); padding: 2.5rem; }
        .nav-link { color: #5f6368; padding: 0.8rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; display: flex; align-items: center; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: #e8f0fe; color: #0d6efd; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <h3 class="text-primary fw-bold mb-5"><i class='bx bxs-plus-circle'></i> MediSync</h3>
    <nav class="nav flex-column">
        <a class="nav-link" href="/doctor/dashboard"><i class='bx bxs-grid-alt'></i> Dashboard</a>
        <a class="nav-link active" href="/doctor/appointments"><i class='bx bx-calendar-event'></i> Appointments</a>
        <a class="nav-link" href="/doctor/patients_list"><i class='bx bx-group'></i> Patients</a>
        <hr>
        <a class="nav-link text-danger" href="/logout"><i class='bx bx-log-out-circle'></i> Logout</a>
    </nav>
</div>

<div class="main-content">
    <h2 class="fw-bold mb-4">Scheduled Appointments</h2>
    <div class="card p-4">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Patient Name</th>
                    <th>Status</th>
                    <th>Last Visit</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for appt in appointments %}
                <tr>
                    <td><b>{{ appt.patient_name }}</b></td>
                    <td><span class="badge bg-success">Completed</span></td>
                    <td>{{ appt.date[:16] }}</td>
                    <td><button class="btn btn-sm btn-outline-primary">View History</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
